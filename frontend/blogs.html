<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Health AI Agent Blogs</title>
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("health-agent-theme");
          const prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme =
            stored === "dark" || stored === "light"
              ? stored
              : prefersDark
                ? "dark"
                : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>

  <body data-page="blogs">
    <div class="shell">
      <div class="hero-stack">
        <header class="hero">
          <div class="app-header-brand">
            <span class="app-header-kicker">Health AI Agent</span>
            <strong>Publishing library</strong>
          </div>
          <nav class="hero-nav">
            <div class="hero-nav-links">
              <a class="nav-link" href="/">Dashboard</a>
              <a class="nav-link active" href="/frontend/blogs.html">Blogs</a>
              <a class="nav-link" href="/frontend/blog-workflow.html"
                >Workflow</a
              >
              <a class="nav-link" href="/frontend/agent-adoption-guide.html"
                >Adoption Guide</a
              >
              <a class="nav-link" href="/frontend/run-guide.html">Run Guide</a>
            </div>
            <button
              class="theme-toggle"
              id="theme-toggle"
              type="button"
              aria-pressed="false"
              aria-label="Switch to dark mode"
            >
              <span class="theme-toggle-track" aria-hidden="true">
                <span class="theme-toggle-thumb"></span>
                <span class="theme-toggle-glyph theme-toggle-glyph-sun">☀</span>
                <span class="theme-toggle-glyph theme-toggle-glyph-moon"
                  >☾</span
                >
              </span>
            </button>
          </nav>
        </header>
        <div class="hero-divider" aria-hidden="true"></div>
      </div>

      <main class="page-content">
        <section class="page-intro">
          <p class="eyebrow">Publishing overview</p>
          <h1>Latest health blogs</h1>
          <p class="hero-copy">
            A frontend view for the most recent published blog records merged
            from available JSON blog files and the publish database, with
            duplicate entries removed.
          </p>
        </section>

        <section class="blog-grid" id="blog-grid"></section>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">No data available.</div>
    </template>

    <script src="/frontend/app.js"></script>
  </body>
</html>
